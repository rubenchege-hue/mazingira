    {name:"Intellectual Property Protection",dim:"G",code:"SV-ME-520a.1",metric:"Approach to ensuring intellectual property protection"},
    {name:"Journalistic Integrity",dim:"S",code:"SV-ME-270a.1",metric:"Monetary losses from legal proceedings associated with libel or slander"},
    {name:"Media Pluralism",dim:"S",code:"SV-ME-260a.1",metric:"Gender and racial/ethnic representation for management, professionals, and other employees"},
  ]},
  "Advertising & Marketing":{sector:"Services",issues:[
    {name:"Advertising Integrity",dim:"S",code:"SV-AD-270a.1",metric:"Monetary losses from legal proceedings associated with false or deceptive advertising"},
    {name:"Data Privacy",dim:"S",code:"SV-AD-220a.1",metric:"Policies and practices relating to behavioral advertising and consumer privacy"},
    {name:"Workforce Diversity & Inclusion",dim:"S",code:"SV-AD-330a.1",metric:"Gender and racial/ethnic representation for management and other employees"},
  ]},
  "Waste Management":{sector:"Infrastructure",issues:[
    {name:"Greenhouse Gas Emissions",dim:"E",code:"IF-WM-110a.1",metric:"Gross global Scope 1 emissions from landfill sites and transport vehicles"},
    {name:"Air Quality",dim:"E",code:"IF-WM-120a.1",metric:"Air emissions of NOx, SOx, PM10, VOCs, mercury, lead, and dioxins"},
    {name:"Workforce Health & Safety",dim:"S",code:"IF-WM-320a.1",metric:"Total recordable incident rate (TRIR) and fatality rate"},
  ]},
};

const DIM_META={E:{label:"Environment",dot:"#639922"},S:{label:"Social",dot:"#378ADD"},G:{label:"Governance",dot:"#7F77DD"},BM:{label:"Business Model & Innovation",dot:"#BA7517"}};
const industries=Object.keys(DATA).sort();

function populateSelects(){
  const a=document.getElementById('selA'),b=document.getElementById('selB');
  industries.forEach(ind=>{
    const oa=document.createElement('option');oa.value=ind;oa.textContent=ind;a.appendChild(oa);
    const ob=document.createElement('option');ob.value=ind;ob.textContent=ind;b.appendChild(ob);
  });
  a.value='Software & IT Services';b.value='Hardware';compare();
}

function compare(){
  const kA=document.getElementById('selA').value,kB=document.getElementById('selB').value;
  const el=document.getElementById('results');
  if(!kA||!kB){el.innerHTML='<div class="placeholder">Select two industries above to compare their material ESG issues.</div>';return;}
  if(kA===kB){el.innerHTML='<div class="placeholder">Select two different industries to compare.</div>';return;}
  const A=DATA[kA],B=DATA[kB];
  const namesA=new Set(A.issues.map(i=>i.name));
  const namesB=new Set(B.issues.map(i=>i.name));
  const shared=[...namesA].filter(n=>namesB.has(n));
  const onlyA=[...namesA].filter(n=>!namesB.has(n));
  const onlyB=[...namesB].filter(n=>!namesA.has(n));
  const total=new Set([...namesA,...namesB]).size;
  const sharedPct=total?Math.round(shared.length/total*100):0;
  const dims=['E','S','G','BM'];
  let html=`
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot dot-shared"></div>Shared by both</div>
      <div class="legend-item"><div class="legend-dot dot-a"></div>Only in ${kA}</div>
      <div class="legend-item"><div class="legend-dot dot-b"></div>Only in ${kB}</div>
    </div>
    <div class="summary-row">
      <div class="stat-card"><div class="stat-val">${shared.length}</div><div class="stat-label">Shared ESG issues</div></div>
      <div class="stat-card"><div class="stat-val">${sharedPct}%</div><div class="stat-label">Overlap rate</div></div>
      <div class="stat-card"><div class="stat-val">${onlyA.length+onlyB.length}</div><div class="stat-label">Unique issues</div></div>
    </div>`;
  dims.forEach(dim=>{
    const dm=DIM_META[dim];
    const dimNamesA=new Set(A.issues.filter(i=>i.dim===dim).map(i=>i.name));
    const dimNamesB=new Set(B.issues.filter(i=>i.dim===dim).map(i=>i.name));
    const allNames=[...new Set([...dimNamesA,...dimNamesB])];
    if(!allNames.length)return;
    html+=`<div class="dim-section"><div class="dim-header"><div class="dim-dot" style="background:${dm.dot}"></div>${dm.label}</div>
      <div class="col-labels"><div class="col-label">${kA} <span style="color:#aaa;font-weight:400">(${A.sector})</span></div><div></div><div class="col-label">${kB} <span style="color:#aaa;font-weight:400">(${B.sector})</span></div></div>`;
    allNames.forEach(name=>{
      const inA=dimNamesA.has(name),inB=dimNamesB.has(name);
      const issA=A.issues.find(i=>i.name===name&&i.dim===dim);
      const issB=B.issues.find(i=>i.name===name&&i.dim===dim);
      const cls=inA&&inB?'shared':inA?'only-a':'only-b';
      const leftCell=inA?`<div class="issue-cell ${cls}"><div class="issue-name ${cls}">${name}</div><span class="metric-pill">${issA.code}</span></div>`:`<div class="issue-cell empty"></div>`;
      const rightCell=inB?`<div class="issue-cell ${cls}"><div class="issue-name ${cls}">${name}</div><span class="metric-pill">${issB.code}</span></div>`:`<div class="issue-cell empty"></div>`;
      const mid=inA&&inB?`<span class="mid-eq">=</span>`:`<span class="mid-dash">—</span>`;
      html+=`<div class="issue-row">${leftCell}<div class="mid-col">${mid}</div>${rightCell}</div>`;
    });
    html+=`</div>`;
  });
  el.innerHTML=html;
}

populateSelects();
</script>
</body>
</html>
