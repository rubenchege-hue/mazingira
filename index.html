<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mazingira — Enter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: 'Inter', system-ui, sans-serif;
    background: #050c0e;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }

  /* ── STARFIELD ──────────────────────────── */
  #stars-canvas {
    position: fixed; inset: 0; z-index: 0;
    width: 100%; height: 100%;
  }

  /* ── LAYOUT ─────────────────────────────── */
  .hero {
    position: relative; z-index: 4;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  /* ── AMBIENT GLOW ───────────────────────── */
  .ambient-glow {
    position: fixed;
    top: 50%; left: 50%;
    width: 80vmin; height: 80vmin;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(29,158,117,0.06) 0%, rgba(10,60,40,0.03) 30%, transparent 60%);
    z-index: 0;
    pointer-events: none;
    animation: ambientPulse 6s ease-in-out infinite;
  }

  @keyframes ambientPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
  }

  /* ── GLOBE ──────────────────────────────── */
  .globe-wrap {
    position: relative;
    width: 340px; height: 340px;
    margin: 0 auto;
    animation: globeEntry 2s cubic-bezier(.22,.61,.36,1) 0.3s both;
  }

  .globe {
    width: 100%; height: 100%;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    box-shadow:
      0 0 80px rgba(29,158,117,0.12),
      0 0 160px rgba(29,158,117,0.06),
      inset 0 -40px 80px rgba(0,0,0,0.4);
  }

  .globe-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(29,158,117,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(232,160,32,0.10) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, #0a4d35 0%, #062b1e 40%, #030f0a 100%);
    animation: rotateGlobe 25s linear infinite;
    position: relative;
    overflow: hidden;
  }

  /* Atmosphere ring */
  .globe::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(29,158,117,0.08);
    z-index: 6;
    animation: atmospherePulse 5s ease-in-out infinite;
  }

  .globe-inner::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.15) 0%, transparent 40%);
    z-index: 5;
    animation: sheen 10s ease-in-out infinite;
  }

  .globe-shadow {
    position: absolute;
    bottom: -30px; left: 5%; right: 5%;
    height: 40px;
    background: radial-gradient(ellipse, rgba(29,158,117,0.12) 0%, transparent 70%);
    animation: pulseGlow 4s ease-in-out infinite;
  }

  /* ── CONTINENTS ─────────────────────────── */
  .continents {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    animation: rotateGlobe 25s linear infinite;
  }
  .continents svg { width: 100%; height: 100%; }
  .land-mass {
    fill: rgba(29,158,117,0.35);
    stroke: rgba(93,202,165,0.12);
    stroke-width: 0.5;
  }
  .land-mass-bright {
    fill: rgba(29,158,117,0.50);
    stroke: rgba(93,202,165,0.2);
    stroke-width: 0.5;
  }

  .grid-lines {
    position: absolute; inset: -10%;
    width: 120%; height: 120%;
    z-index: 1;
    animation: rotateGlobe 25s linear infinite;
  }
  .grid-lines svg { width: 100%; height: 100%; }
  .grid-line {
    fill: none;
    stroke: rgba(93,202,165,0.05);
    stroke-width: 0.5;
  }

  /* ── FOREST (Background Layer) ──────────── */
  .forest-layer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 45vh;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .forest-bg {
    position: absolute;
    bottom: 0; left: -2%; right: -2%;
    height: 75%;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    opacity: 0.4;
  }

  .forest-bg-tree {
    flex-shrink: 0;
    opacity: 0;
    animation: treeFadeIn 2s cubic-bezier(.22,.61,.36,1) forwards;
  }
  .forest-bg-tree:nth-child(1) { animation-delay: 1.0s; height: 60%; }
  .forest-bg-tree:nth-child(2) { animation-delay: 1.3s; height: 75%; }
  .forest-bg-tree:nth-child(3) { animation-delay: 0.9s; height: 50%; }
  .forest-bg-tree:nth-child(4) { animation-delay: 1.5s; height: 70%; }
  .forest-bg-tree:nth-child(5) { animation-delay: 1.1s; height: 55%; }
  .forest-bg-tree:nth-child(6) { animation-delay: 1.4s; height: 65%; }
  .forest-bg-tree:nth-child(7) { animation-delay: 0.8s; height: 45%; }
  .forest-bg-tree:nth-child(8) { animation-delay: 1.2s; height: 80%; }
  .forest-bg-tree:nth-child(9) { animation-delay: 1.6s; height: 55%; }
  .forest-bg-tree:nth-child(10) { animation-delay: 1.0s; height: 70%; }
  .forest-bg-tree:nth-child(11) { animation-delay: 1.3s; height: 60%; }
  .forest-bg-tree:nth-child(12) { animation-delay: 0.7s; height: 50%; }

  .forest-bg-tree svg {
    height: auto;
    transform-origin: bottom center;
    animation: treeSwayBg 6s ease-in-out infinite;
  }
  .forest-bg-tree:nth-child(odd) svg { animation-delay: 0s; }
  .forest-bg-tree:nth-child(even) svg { animation-delay: 3s; }

  /* ── FOREST (Foreground Layer) ──────────── */
  .forest-fg {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 30vh;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }

  .forest-fg-scene {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 2%;
  }

  .forest-fg-tree {
    flex-shrink: 0;
    opacity: 0;
    animation: treeFadeIn 1.5s cubic-bezier(.22,.61,.36,1) forwards;
  }
  .forest-fg-tree:nth-child(1) { animation-delay: 1.6s; height: 70%; }
  .forest-fg-tree:nth-child(2) { animation-delay: 1.9s; height: 85%; }
  .forest-fg-tree:nth-child(3) { animation-delay: 1.5s; height: 60%; }
  .forest-fg-tree:nth-child(4) { animation-delay: 2.1s; height: 90%; }
  .forest-fg-tree:nth-child(5) { animation-delay: 1.7s; height: 65%; }
  .forest-fg-tree:nth-child(6) { animation-delay: 2.0s; height: 80%; }
  .forest-fg-tree:nth-child(7) { animation-delay: 1.4s; height: 55%; }
  .forest-fg-tree:nth-child(8) { animation-delay: 1.8s; height: 75%; }

  .forest-fg-tree svg {
    height: auto;
    transform-origin: bottom center;
    animation: treeSwayFg 4s ease-in-out infinite;
  }
  .forest-fg-tree:nth-child(odd) svg { animation-delay: 0s; }
  .forest-fg-tree:nth-child(even) svg { animation-delay: 2s; }

  .forest-ground-glow {
    position: absolute;
    bottom: 0; left: -5%; right: -5%;
    height: 35%;
    background: linear-gradient(to top, rgba(6,20,10,0.9) 0%, rgba(8,30,18,0.4) 50%, transparent 100%);
    z-index: -1;
  }

  /* ── SIDE PALM TREES ────────────────────── */
  .tree-side {
    position: fixed;
    bottom: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0;
    animation: treeFadeIn 2.5s cubic-bezier(.22,.61,.36,1) 1.0s forwards;
  }
  .tree-side.left {
    left: -20px;
    transform-origin: bottom center;
    animation: treeSwaySide 6s ease-in-out infinite;
  }
  .tree-side.right {
    right: -20px;
    transform-origin: bottom center;
    animation: treeSwaySide 6s ease-in-out 3s infinite;
  }
  .tree-side svg { height: auto; display: block; }

  /* ── BRAND & TEXT ───────────────────────── */
  .intro-brand {
    text-align: center;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  .intro-brand-name {
    font-size: 44px; font-weight: 900;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #5DCAA5 0%, #1D9E75 40%, #E8A020 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    animation: textReveal 1.4s cubic-bezier(.22,.61,.36,1) 1.0s both;
  }
  .intro-brand-name span { 
    background: none;
    -webkit-text-fill-color: #E8A020;
    color: #E8A020;
  }

  .intro-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: 8px;
    opacity: 0;
    animation: textReveal 1.2s cubic-bezier(.22,.61,.36,1) 1.6s both;
  }

  .intro-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
    font-weight: 200;
    margin-top: 4px;
    opacity: 0;
    animation: textReveal 1.2s cubic-bezier(.22,.61,.36,1) 1.9s both;
  }

  /* ── ENTER BUTTON ───────────────────────── */
  .enter-wrap {
    margin-top: 36px;
    opacity: 0;
    animation: fadeInUp 1s cubic-bezier(.22,.61,.36,1) 2.3s both;
  }

  .btn-enter {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 15px 40px;
    border: 1px solid rgba(29,158,117,0.3);
    border-radius: 99px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Inter', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(29,158,117,0.08);
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(.22,.61,.36,1);
    position: relative;
    overflow: hidden;
    outline: none;
  }

  .btn-enter::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 99px;
    background: linear-gradient(135deg, rgba(29,158,117,0.15) 0%, rgba(232,160,32,0.08) 100%);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .btn-enter:hover {
    border-color: rgba(29,158,117,0.6);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(29,158,117,0.15), 0 0 60px rgba(29,158,117,0.05);
  }

  .btn-enter:hover::before {
    opacity: 1;
  }

  .btn-enter:active {
    transform: scale(0.97);
  }

  .btn-enter:focus-visible {
    outline: none;
    border-color: rgba(29,158,117,0.8);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.2);
  }

  .btn-enter .arrow {
    display: inline-block;
    transition: transform 0.3s ease;
  }

  .btn-enter:hover .arrow {
    transform: translateX(4px);
  }

  .btn-enter .icon-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(29,158,117,0.15);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .btn-enter:hover .icon-circle {
    background: rgba(29,158,117,0.3);
    box-shadow: 0 0 20px rgba(29,158,117,0.15);
  }

  /* Button pulse ring */
  .btn-enter .pulse-ring {
    position: absolute;
    inset: -4px;
    border-radius: 99px;
    border: 1px solid rgba(29,158,117,0.1);
    animation: btnPulse 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes btnPulse {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0; transform: scale(1.05); }
  }

  /* ── FIREFLY PARTICLES ──────────────────── */
  #fireflies-canvas {
    position: fixed; inset: 0; z-index: 5;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── LEAF PARTICLES ─────────────────────── */
  #leaves-canvas {
    position: fixed; inset: 0; z-index: 6;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* ── TRANSITION OVERLAY ─────────────────── */
  .transition-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #050c0e;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }
  .transition-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }
  .transition-overlay .globe-mini {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 50%, #0a4d35 0%, #062b1e 40%, #030f0a 100%);
    box-shadow: 0 0 40px rgba(29,158,117,0.3);
    animation: rotateGlobe 2s linear infinite;
    position: relative;
    overflow: hidden;
  }
  .transition-overlay .globe-mini::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.15) 0%, transparent 40%);
  }

  /* ── KEYFRAMES ──────────────────────────── */
  @keyframes rotateGlobe {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  @keyframes sheen {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.03); }
  }
  @keyframes atmospherePulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.02); }
  }
  @keyframes pulseGlow {
    0%, 100% { opacity: 0.3; transform: scaleX(1); }
    50% { opacity: 0.6; transform: scaleX(1.3); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes globeEntry {
    from { opacity: 0; transform: scale(0.7) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes textReveal {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes treeFadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes treeSwayBg {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(0.4deg); }
    75% { transform: rotate(-0.4deg); }
  }
  @keyframes treeSwayFg {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(0.6deg); }
    75% { transform: rotate(-0.6deg); }
  }
  @keyframes treeSwaySide {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(0.7deg); }
    75% { transform: rotate(-0.7deg); }
  }
  @keyframes fireflyFloat {
    0%, 100% { opacity: 0.2; transform: translateY(0) scale(1); }
    50% { opacity: 0.8; transform: translateY(-8px) scale(1.2); }
  }

  /* ── AUDIO TOGGLE ────────────────────────── */
  .audio-toggle {
    position: fixed;
    bottom: 24px; left: 24px;
    z-index: 999;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeInUp 1s cubic-bezier(.22,.61,.36,1) 3.0s both;
    color: rgba(255,255,255,0.3);
  }
  .audio-toggle:hover {
    border-color: rgba(29,158,117,0.3);
    color: rgba(255,255,255,0.6);
    background: rgba(29,158,117,0.1);
    box-shadow: 0 0 15px rgba(29,158,117,0.08);
  }
  .audio-toggle svg { display: block; }
  .audio-toggle .icon-off { display: none; }
  .audio-toggle.muted .icon-on { display: none; }
  .audio-toggle.muted .icon-off { display: block; }

  @media (max-width: 768px) {
    .globe-wrap { width: 220px; height: 220px; margin-bottom: 0; }
    .intro-brand-name { font-size: 30px; letter-spacing: -1px; }
    .intro-tagline { font-size: 11px; letter-spacing: 2px; }
    .forest-layer { height: 30vh; }
    .forest-fg { height: 20vh; }
    .forest-bg-tree:nth-child(n+8) { display: none; }
    .forest-fg-tree:nth-child(n+6) { display: none; }
    .tree-side { display: none; }
    .btn-enter { padding: 12px 28px; font-size: 12px; }
  }

  @media (max-width: 480px) {
    .globe-wrap { width: 160px; height: 160px; }
    .intro-brand-name { font-size: 24px; }
    .forest-bg-tree:nth-child(n+5) { display: none; }
    .forest-fg-tree:nth-child(n+4) { display: none; }
    .btn-enter { padding: 10px 22px; font-size: 11px; gap: 6px; }
  }
</style>
</head>
<body>

<!-- ── STARFIELD ── -->
<canvas id="stars-canvas"></canvas>

<!-- ── AMBIENT GLOW ── -->
<div class="ambient-glow"></div>

<!-- ── BACKGROUND FOREST ── -->
<div class="forest-layer">
  <div class="forest-bg">
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="34" height="100%" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,0 5,40 15,40 0,80 12,80 0,120 40,120 28,80 40,80 25,40 35,40" fill="rgba(10,55,35,0.18)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="44" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="60" width="8" height="60" fill="rgba(6,25,15,0.2)" rx="2"/>
        <ellipse cx="20" cy="45" rx="18" ry="22" fill="rgba(10,55,35,0.15)"/>
        <ellipse cx="20" cy="25" rx="14" ry="18" fill="rgba(15,75,45,0.12)"/>
        <ellipse cx="20" cy="10" rx="10" ry="12" fill="rgba(20,95,55,0.08)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="30" height="100%" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,0 5,40 15,40 0,80 12,80 0,120 40,120 28,80 40,80 25,40 35,40" fill="rgba(10,55,35,0.18)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="48" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="60" width="8" height="60" fill="rgba(6,25,15,0.2)" rx="2"/>
        <ellipse cx="20" cy="40" rx="20" ry="25" fill="rgba(10,55,35,0.15)"/>
        <ellipse cx="20" cy="20" rx="15" ry="18" fill="rgba(15,75,45,0.12)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="38" height="100%" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,0 3,50 15,50 0,90 14,90 0,120 40,120 26,90 40,90 25,50 37,50" fill="rgba(8,45,30,0.16)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="35" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="60" width="8" height="60" fill="rgba(6,25,15,0.2)" rx="2"/>
        <ellipse cx="20" cy="45" rx="18" ry="22" fill="rgba(10,55,35,0.15)"/>
        <ellipse cx="20" cy="25" rx="14" ry="18" fill="rgba(15,75,45,0.12)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="40" height="100%" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,0 5,40 15,40 0,80 12,80 0,120 40,120 28,80 40,80 25,40 35,40" fill="rgba(10,55,35,0.18)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="50" height="100%" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="60" width="8" height="60" fill="rgba(6,25,15,0.2)" rx="2"/>
        <ellipse cx="20" cy="40" rx="20" ry="25" fill="rgba(10,55,35,0.15)"/>
        <ellipse cx="20" cy="20" rx="15" ry="18" fill="rgba(15,75,45,0.12)"/>
        <ellipse cx="20" cy="8" rx="9" ry="10" fill="rgba(20,95,55,0.08)"/>
      </svg>
    </div>
    <div class="forest-bg-tree">
      <svg viewBox="0 0 40 120" width="32" height="100%" xmlns="http://www.w3.org/2000/svg">
        <polygon points="20,0 5,40 15,40 0,80 12,80 0,120 40,120 28,80 40,80 25,40 35,40" fill="rgba(10,55,35,0.18)"/>
      </svg>
    </div>

<script>
// ── STARFIELD ──────────────────────────────
(function() {
  var canvas = document.getElementById('stars-canvas');
  var ctx = canvas.getContext('2d');
  var stars = [];
  var W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 250; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      a: Math.random(),
      s: Math.random() * 0.008 + 0.002
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      s.a += s.s;
      var alpha = 0.2 + 0.8 * (0.5 + 0.5 * Math.sin(s.a));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.fill();
    }
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

// ── FIREFLIES ──────────────────────────────
(function() {
  var canvas = document.getElementById('fireflies-canvas');
  var ctx = canvas.getContext('2d');
  var fireflies = [];
  var W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 40; i++) {
    fireflies.push(createFirefly());
  }

  function createFirefly() {
    return {
      x: Math.random() * W,
      y: Math.random() * H * 0.8,
      size: 1.5 + Math.random() * 3,
      speedX: (Math.random() - 0.5) * 0.3,
      speedY: -(0.1 + Math.random() * 0.3),
      phase: Math.random() * Math.PI * 2,
      phaseSpeed: 0.01 + Math.random() * 0.03,
      twinkleSpeed: 0.02 + Math.random() * 0.04,
      twinkleOffset: Math.random() * Math.PI * 2,
      opacity: 0.2 + Math.random() * 0.4
    };
  }

  function drawFireflies() {
    ctx.clearRect(0, 0, W, H);
    for (var i = 0; i < fireflies.length; i++) {
      var f = fireflies[i];
      f.x += f.speedX + Math.sin(f.phase) * 0.2;
      f.y += f.speedY;
      f.phase += f.phaseSpeed;
      f.twinkleOffset += f.twinkleSpeed;

      if (f.y < -10) {
        fireflies[i] = createFirefly();
        fireflies[i].y = H + 10;
        continue;
      }
      if (f.x < -20) f.x = W + 10;
      if (f.x > W + 20) f.x = -10;

      var glow = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(f.twinkleOffset));

      // Glow halo
      var grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.size * 6);
      grad.addColorStop(0, 'rgba(93,202,165,' + (f.opacity * glow * 0.6) + ')');
      grad.addColorStop(0.3, 'rgba(29,158,117,' + (f.opacity * glow * 0.3) + ')');
      grad.addColorStop(1, 'rgba(29,158,117,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 6, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(200,255,230,' + (f.opacity * glow) + ')';
      ctx.fill();

      // Inner bright core
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.size * 0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (f.opacity * glow * 0.8) + ')';
      ctx.fill();
    }
    requestAnimationFrame(drawFireflies);
  }
  drawFireflies();
})();

// ── FLOATING LEAVES ────────────────────────
(function() {
  var canvas = document.getElementById('leaves-canvas');
  var ctx = canvas.getContext('2d');
  var leaves = [];
  var W, H;
  var LEAF_COLORS = [
    'rgba(29,158,117,0.35)',
    'rgba(93,202,165,0.25)',
    'rgba(26,130,90,0.3)',
    'rgba(45,180,130,0.2)',
    'rgba(20,110,75,0.25)',
    'rgba(232,160,32,0.15)'
  ];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createLeaf() {
    return {
      x: Math.random() * W,
      y: -20 - Math.random() * H * 0.4,
      size: 4 + Math.random() * 8,
      speedX: -0.15 + Math.random() * 0.3,
      speedY: 0.25 + Math.random() * 0.5,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.015,
      wobbleOffset: Math.random() * Math.PI * 2,
      wobbleSpeed: 0.005 + Math.random() * 0.012,
      color: LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)],
      opacity: 0.3 + Math.random() * 0.4,
      shape: Math.floor(Math.random() * 3),
      phase: Math.random() * Math.PI * 2
    };
  }

  for (var i = 0; i < 15; i++) {
    var l = createLeaf();
    l.y = Math.random() * H;
    leaves.push(l);
  }

  function drawLeaves() {
    ctx.clearRect(0, 0, W, H);
    if (leaves.length < 30 && Math.random() < 0.04) {
      leaves.push(createLeaf());
    }
    for (var i = 0; i < leaves.length; i++) {
      var l = leaves[i];
      l.x += l.speedX + Math.sin(l.wobbleOffset + l.phase) * 0.25;
      l.y += l.speedY;
      l.rotation += l.rotSpeed;
      l.wobbleOffset += l.wobbleSpeed;
      l.phase += 0.003;

      if (l.y > H + 20) { leaves[i] = createLeaf(); continue; }
      if (l.x < -30) l.x = W + 10;
      if (l.x > W + 30) l.x = -10;

      ctx.save();
      ctx.translate(l.x, l.y);
      ctx.rotate(l.rotation);
      ctx.globalAlpha = l.opacity;
      ctx.fillStyle = l.color;
      ctx.beginPath();

      if (l.shape === 0) {
        ctx.ellipse(0, 0, l.size, l.size * 0.45, 0, 0, Math.PI * 2);
      } else if (l.shape === 1) {
        ctx.moveTo(0, -l.size);
        ctx.quadraticCurveTo(l.size * 0.7, -l.size * 0.3, l.size * 0.4, l.size * 0.3);
        ctx.quadraticCurveTo(0, l.size * 0.5, -l.size * 0.4, l.size * 0.3);
        ctx.quadraticCurveTo(-l.size * 0.7, -l.size * 0.3, 0, -l.size);
      } else {
        ctx.moveTo(0, -l.size);
        ctx.lineTo(l.size * 0.4, 0);
        ctx.lineTo(0, l.size * 0.4);
        ctx.lineTo(-l.size * 0.4, 0);
        ctx.closePath();
      }
      ctx.fill();
      ctx.restore();
    }
    requestAnimationFrame(drawLeaves);
  }
  drawLeaves();
})();

// ── AMBIENT AUDIO ENGINE ───────────────────-
var AudioEngine = (function() {
  var ctx = null;
  var masterGain = null;
  var windGain = null;
  var started = false;
  var muted = false;
  var birdTimeouts = [];

  function init() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.25;
      masterGain.connect(ctx.destination);

      createWind();
      createForestFloor();
      scheduleBirds();
    } catch(e) {
      console.warn('Web Audio not available:', e);
    }
  }

  // ── Noise buffer generator ──
  function createNoiseBuffer(length) {
    var buffer = ctx.createBuffer(1, length, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < length; i++) {
      data[i] = Math.random() * 2 - 1;
    }
    return buffer;
  }

  // ── Wind layer: filtered white noise with LFO modulation ──
  function createWind() {
    var buffer = createNoiseBuffer(ctx.sampleRate * 3);
    var source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    var lowpass = ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 250;
    lowpass.Q.value = 1.5;

    var highpass = ctx.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 40;

    // LFO to modulate filter cutoff (wind gusting)
    var lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.08;
    var lfoGain = ctx.createGain();
    lfoGain.gain.value = 180;
    lfo.connect(lfoGain);
    lfoGain.connect(lowpass.frequency);
    lfo.start();

    // Second slower LFO for volume swells
    var lfo2 = ctx.createOscillator();
    lfo2.type = 'sine';
    lfo2.frequency.value = 0.035;
    var lfo2Gain = ctx.createGain();
    lfo2Gain.gain.value = 0.04;
    lfo2.connect(lfo2Gain);

    windGain = ctx.createGain();
    windGain.gain.value = 0.3;

    lfo2Gain.connect(windGain.gain);
    lfo2.start();

    source.connect(lowpass);
    lowpass.connect(highpass);
    highpass.connect(windGain);
    windGain.connect(masterGain);

    source.start();
  }

  // ── Forest floor: low rumble layer ──
  function createForestFloor() {
    var buffer = createNoiseBuffer(ctx.sampleRate * 4);
    var source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    var lowpass = ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 90;
    lowpass.Q.value = 1.0;

    var gain = ctx.createGain();
    gain.gain.value = 0.15;

    source.connect(lowpass);
    lowpass.connect(gain);
    gain.connect(masterGain);

    source.start();
  }

  // ── Bird chirps via FM synthesis ──
  function createBirdChirp() {
    if (!ctx || muted) return;

    var now = ctx.currentTime;
    var carrier = ctx.createOscillator();
    carrier.type = 'sine';
    // Different pitch range
    carrier.frequency.value = 1800 + Math.random() * 1200;

    var modulator = ctx.createOscillator();
    modulator.type = 'sine';
    modulator.frequency.value = 5 + Math.random() * 8;

    var modGain = ctx.createGain();
    modGain.gain.value = 300 + Math.random() * 400;

    var chirpGain = ctx.createGain();
    chirpGain.gain.setValueAtTime(0, now);
    chirpGain.gain.linearRampToValueAtTime(0.06, now + 0.02);
    chirpGain.gain.linearRampToValueAtTime(0.04, now + 0.05);
    chirpGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

    // Stereo positioning
    var pan = ctx.createStereoPanner();
    pan.pan.value = (Math.random() - 0.5) * 1.6;

    modulator.connect(modGain);
    modGain.connect(carrier.frequency);

    carrier.connect(chirpGain);
    chirpGain.connect(pan);
    pan.connect(masterGain);

    carrier.start(now);
    modulator.start(now);
    carrier.stop(now + 0.2);
    modulator.stop(now + 0.2);
  }

  function scheduleBirds() {
    if (!ctx) return;

    function nextBird() {
      if (!started) return;
      var delay = 3000 + Math.random() * 8000;
      var id = setTimeout(function() {
        createBirdChirp();
        if (started) nextBird();
      }, delay);
      birdTimeouts.push(id);
    }

    // First chirp after a short delay
    var firstDelay = setTimeout(function() {
      createBirdChirp();
      nextBird();
    }, 4000);
    birdTimeouts.push(firstDelay);
  }

  // ── Enter whoosh ──
  function playWhoosh() {
    if (!ctx) return;
    var now = ctx.currentTime;
    var bufferSize = ctx.sampleRate * 0.5;
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    var source = ctx.createBufferSource();
    source.buffer = buffer;

    var bandpass = ctx.createBiquadFilter();
    bandpass.type = 'bandpass';
    bandpass.frequency.setValueAtTime(120, now);
    bandpass.frequency.exponentialRampToValueAtTime(400, now + 0.4);
    bandpass.Q.value = 2;

    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.12, now + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);

    source.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(masterGain);

    source.start(now);
    source.stop(now + 0.6);
  }

  // ── Fade out on transition ──
  function fadeOut(duration) {
    if (!ctx) return;
    var now = ctx.currentTime;
    masterGain.gain.linearRampToValueAtTime(0, now + duration / 1000);
  }

  // ── Start audio (called on first user interaction) ──
  function start() {
    if (started) return;
    started = true;
    init();
    if (ctx && ctx.state === 'suspended') {
      ctx.resume();
    }
  }

  function toggleMute() {
    if (!ctx) return;
    muted = !muted;
    var now = ctx.currentTime;
    if (muted) {
      masterGain.gain.linearRampToValueAtTime(0, now + 0.3);
    } else {
      masterGain.gain.linearRampToValueAtTime(0.25, now + 0.3);
    }
    return muted;
  }

  function isStarted() { return started; }

  function cleanup() {
    started = false;
    birdTimeouts.forEach(clearTimeout);
    birdTimeouts = [];
  }

  return {
    start: start,
    toggleMute: toggleMute,
    isStarted: isStarted,
    fadeOut: fadeOut,
    playWhoosh: playWhoosh,
    cleanup: cleanup
  };
})();

// ── START AUDIO ON FIRST INTERACTION ───────
function initAudioOnInteraction() {
  if (AudioEngine.isStarted()) return;
  AudioEngine.start();
  document.removeEventListener('click', initAudioOnInteraction);
  document.removeEventListener('keydown', initAudioOnInteraction);
  document.removeEventListener('touchstart', initAudioOnInteraction);
}
document.addEventListener('click', initAudioOnInteraction);
document.addEventListener('keydown', initAudioOnInteraction);
document.addEventListener('touchstart', initAudioOnInteraction);

// ── AUDIO TOGGLE ───────────────────────────
var audioToggleBtn = document.getElementById('audio-toggle');
audioToggleBtn.addEventListener('click', function(e) {
  e.stopPropagation();
  if (!AudioEngine.isStarted()) {
    AudioEngine.start();
  }
  var muted = AudioEngine.toggleMute();
  if (muted) {
    audioToggleBtn.classList.add('muted');
  } else {
    audioToggleBtn.classList.remove('muted');
  }
});

// ── ENTER HANDLER ──────────────────────────
function handleEnter() {
  var btn = document.getElementById('enter-btn');
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.5';

  AudioEngine.playWhoosh();
  AudioEngine.fadeOut(1000);
  AudioEngine.cleanup();

  var overlay = document.getElementById('transition-overlay');
  overlay.classList.add('active');

  setTimeout(function() {
    window.location.href = 'landing.html';
  }, 1200);
}

// ── KEYBOARD ENTER ─────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    handleEnter();
  }
});


</script>
