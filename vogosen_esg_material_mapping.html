const DIM_COLORS = {E:{dot:'#3B6D11',bar:'#639922',cls:'dim-e',label:'Environment'},S:{dot:'#185FA5',bar:'#378ADD',cls:'dim-s',label:'Social'},G:{dot:'#534AB7',bar:'#7F77DD',cls:'dim-g',label:'Governance'},BM:{dot:'#854F0B',bar:'#BA7517',cls:'dim-bm',label:'Business Model & Innovation'}};

let view = 'sectors'; // 'sectors' | 'industries' | 'detail' | 'search'
let activeSector = null;
let activeIndustry = null;

function allIndustries(){
  const out=[];
  Object.entries(SECTORS).forEach(([sec,sd])=>sd.industries.forEach(ind=>out.push({...ind,sector:sec})));
  return out;
}

function onSearch(){
  const q = document.getElementById('searchQ').value.trim().toLowerCase();
  if(!q){view='sectors';activeSector=null;activeIndustry=null;render();return;}
  view='search';render(q);
}

function render(q){
  const el=document.getElementById('main');
  if(view==='search'){
    const results=[];
    allIndustries().forEach(ind=>{
      const inName=ind.name.toLowerCase().includes(q);
      const inSec=ind.sector.toLowerCase().includes(q);
      const matchIssues=ind.issues.filter(i=>i.name.toLowerCase().includes(q)||i.metric.toLowerCase().includes(q)||i.code.toLowerCase().includes(q));
      if(inName||inSec||matchIssues.length) results.push({...ind,matchIssues:matchIssues.length?matchIssues:null,reason:inName||inSec?'industry':'issue'});
    });
    if(!results.length){el.innerHTML=`<div class="empty"><i class="ti ti-search-off" aria-hidden="true" style="font-size:28px;display:block;margin-bottom:8px;"></i>No results for "${q}"</div>`;return;}
    el.innerHTML=`<div class="sr-label">${results.length} result${results.length!==1?'s':''} for "${q}"</div>`+
      results.map(r=>`<div class="sr-item" onclick="goDetail('${r.sector}','${r.name}')">
        <div class="sr-item-top"><span class="sr-iname">${r.name}</span><span class="sr-sector">${r.sector}</span></div>
        ${r.matchIssues?r.matchIssues.map(i=>`<div class="sr-issue"><span class="metric-code" style="font-size:10px;">${i.code}</span> ${i.name}</div>`).join(''):'<div class="sr-issue" style="color:var(--text-muted);">Industry match</div>'}
      </div>`).join('');
    return;
  }
  if(view==='sectors'){
    el.innerHTML=`<div class="sectors-grid">${Object.entries(SECTORS).map(([name,sd])=>`
      <div class="sector-card" onclick="goSector('${name}')">
        <div class="sector-name">${name}</div>
        <div class="sector-count">${sd.industries.length} industries · ${sd.industries.reduce((a,i)=>a+i.co,0).toLocaleString()} companies</div>
      </div>`).join('')}</div>`;
    return;
  }
  if(view==='industries'){
    const sd=SECTORS[activeSector];
    el.innerHTML=`
      <div class="back-btn" onclick="goBack('sectors')"><i class="ti ti-arrow-left" aria-hidden="true"></i> All sectors</div>
      <div class="industry-header"><h2>${activeSector}</h2></div>
      <div class="industry-list">${sd.industries.map(ind=>`
        <div class="ind-item" onclick="goDetail('${activeSector}','${ind.name}')">
          <div><div class="ind-name">${ind.name}</div><div class="ind-co">${ind.co.toLocaleString()} companies</div></div>
          <i class="ti ti-chevron-right ind-arrow" aria-hidden="true"></i>
        </div>`).join('')}</div>`;
    return;
  }
  if(view==='detail'){
    const sd=SECTORS[activeSector];
    const ind=sd.industries.find(i=>i.name===activeIndustry);
    const grouped={};
    ind.issues.forEach(i=>{if(!grouped[i.name])grouped[i.name]=[];grouped[i.name].push(i);});
    el.innerHTML=`
      <div class="back-btn" onclick="goBack('industries')"><i class="ti ti-arrow-left" aria-hidden="true"></i> ${activeSector}</div>
      <div class="industry-header">
        <h2>${ind.name}</h2>
        <span class="sector-badge">Sector: ${activeSector}</span>
      </div>
      ${Object.entries(grouped).map(([issueName,metrics])=>{
        const dim=metrics[0].dim;
        const dc=DIM_COLORS[dim]||DIM_COLORS.E;
        return `<div class="issue-card">
          <div class="issue-header">
            <div class="issue-dot" style="background:${dc.dot}"></div>
            <div>
              <div class="issue-name">${issueName}</div>
              <span class="dim-tag ${dc.cls}">${dc.label}</span>
            </div>
          </div>
          <div class="metrics">${metrics.map(m=>`
            <div class="metric-row">
              <span class="metric-code">${m.code}</span>
              <span class="metric-desc">${m.metric}</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('')}
      <button class="filter-btn" style="margin-top:8px;font-size:12px;" onclick="sendPrompt('Tell me more about ESG materiality for the ${ind.name} industry — key risks, SASB metrics in depth, and how companies are reporting on these issues')">Ask Claude to go deeper ↗</button>`;
  }
}

function goSector(name){activeSector=name;view='industries';render();}
function goDetail(sec,ind){activeSector=sec;activeIndustry=ind;view='detail';render();}
function goBack(to){
  if(to==='sectors'){view='sectors';activeSector=null;activeIndustry=null;}
  else{view='industries';activeIndustry=null;}
  render();
}

render();
</script>
